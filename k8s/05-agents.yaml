# k8s/04-tool-servers.yaml — Day 12
# Eight tool/service MCP servers. Each follows the same shape:
#   Deployment (1 replica, image built from your Dockerfile, command override)
#   + ClusterIP Service (internal-only — matches ConfigMap hostnames)
#
# memory, conversation, and eval-server additionally mount a PVC for their
# persistent JSON/Chroma data — same volumes from docker-compose, translated.
#
# NOTE: replace synapse-app:latest with your actual built image name/tag
# if you push to a registry. For a local cluster (kind/minikube), load
# the image with:
#   kind load docker-image synapse-app:latest
#   (or) minikube image load synapse-app:latest

# ==================== WORLD-DATA ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: world-data-deployment
  namespace: synapse
  labels:
    app: world-data
    tier: tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: world-data
  template:
    metadata:
      labels:
        app: world-data
        tier: tool
    spec:
      containers:
        - name: world-data
          image: synapse-app:latest
          command: ["python", "mcp-servers/world-data/server.py"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: synapse-config
            - secretRef:
                name: synapse-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: world-data-svc
  namespace: synapse
spec:
  type: ClusterIP
  selector:
    app: world-data
  ports:
    - port: 8001
      targetPort: 8001

