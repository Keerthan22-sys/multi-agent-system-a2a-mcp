# ==================== MEMORY (+ PVC) ====================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-pvc
  namespace: synapse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-deployment
  namespace: synapse
  labels:
    app: memory
    tier: tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory
  template:
    metadata:
      labels:
        app: memory
        tier: tool
    spec:
      containers:
        - name: memory
          image: synapse-app:latest
          command: ["python", "mcp-servers/memory/server.py"]
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: synapse-config
            - secretRef:
                name: synapse-secrets
          volumeMounts:
            - name: memory-data
              mountPath: /app/synapse/memory_store
      volumes:
        - name: memory-data
          persistentVolumeClaim:
            claimName: memory-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: memory-svc
  namespace: synapse
spec:
  type: ClusterIP
  selector:
    app: memory
  ports:
    - port: 8006
      targetPort: 8006

