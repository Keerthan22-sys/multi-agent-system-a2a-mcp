# k8s/02-secret-template.yaml — Day 12
#
# DO NOT fill this in and commit it. This is a TEMPLATE.
#
# Two ways to create the real secret:
#
# OPTION A (recommended) — create directly from your existing .env file,
# nothing ever touches disk in plaintext YAML:
#
#   kubectl create secret generic synapse-secrets \
#     --namespace=synapse \
#     --from-env-file=.env
#
# OPTION B — fill in this template, apply it, then DELETE the filled file
# immediately and ensure it's in .gitignore:
#
#   kubectl apply -f k8s/02-secret-filled.yaml
#   rm k8s/02-secret-filled.yaml
#
# Either way, verify it landed correctly with:
#   kubectl get secret synapse-secrets -n synapse
#   kubectl describe secret synapse-secrets -n synapse   (shows keys, not values)

apiVersion: v1
kind: Secret
metadata:
  name: synapse-secrets
  namespace: synapse
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  NEWS_API_KEY: "REPLACE_ME"
  OPENWEATHER_API_KEY: "REPLACE_ME"
  EXCHANGE_RATE_API_KEY: "REPLACE_ME"
  PEXELS_API_KEY: "REPLACE_ME"