# k8s/03-infra.yaml — Day 12
# Redis (cache + mailbox broker) and Phoenix (observability), each with
# their own PVC for persistence across pod restarts.

# ==================== REDIS ====================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: synapse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: synapse
  labels:
    app: redis
    tier: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: infra
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: synapse
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

# ==================== PHOENIX ====================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: phoenix-pvc
  namespace: synapse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-deployment
  namespace: synapse
  labels:
    app: phoenix
    tier: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
        tier: infra
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          ports:
            - containerPort: 6006
          env:
            - name: PHOENIX_WORKING_DIR
              value: "/data"
          volumeMounts:
            - name: phoenix-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 6006
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: phoenix-data
          persistentVolumeClaim:
            claimName: phoenix-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix-svc
  namespace: synapse
spec:
  type: ClusterIP
  selector:
    app: phoenix
  ports:
    - port: 6006
      targetPort: 6006