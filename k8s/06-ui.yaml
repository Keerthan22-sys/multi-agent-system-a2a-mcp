# k8s/06-ui.yaml — Day 12
# Streamlit UI — the only service exposed outside the cluster.
# NodePort matches the pattern from the Rails-on-K8s and fault-tolerant
# K8s projects: internal services stay ClusterIP, the one user-facing
# entry point gets NodePort (or LoadBalancer on a real cloud cluster).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: synapse
  labels:
    app: ui
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
        tier: frontend
    spec:
      containers:
        - name: ui
          image: synapse-app:latest
          command:
            - streamlit
            - run
            - ui/app.py
            - --server.address=0.0.0.0
            - --server.port=8501
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: synapse-config
            - secretRef:
                name: synapse-secrets
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui-svc
  namespace: synapse
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 31501